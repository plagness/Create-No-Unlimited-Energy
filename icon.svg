<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e3a5f"/><stop offset="1" stop-color="#0a6b6b"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d7c9a0"/><stop offset="1" stop-color="#a98c52"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="44" fill="url(#bg)"/>
  <!-- water -->
  <g fill="none" stroke="#7fd6ff" stroke-width="6" stroke-linecap="round" opacity="0.85">
    <path d="M16 210 q22 -16 44 0 t44 0 t44 0 t44 0 t44 0"/>
    <path d="M16 230 q22 -16 44 0 t44 0 t44 0 t44 0 t44 0" opacity="0.6"/>
  </g>
  <!-- water wheel -->
  <g transform="translate(128,118)">
    <circle r="86" fill="none" stroke="url(#wood)" stroke-width="14"/>
    <circle r="16" fill="url(#wood)"/>
    <g stroke="url(#wood)" stroke-width="10" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-80"/><line x1="0" y1="0" x2="0" y2="80"/>
      <line x1="0" y1="0" x2="-80" y2="0"/><line x1="0" y1="0" x2="80" y2="0"/>
      <line x1="0" y1="0" x2="-57" y2="-57"/><line x1="0" y1="0" x2="57" y2="57"/>
      <line x1="0" y1="0" x2="57" y2="-57"/><line x1="0" y1="0" x2="-57" y2="57"/>
    </g>
    <!-- paddles -->
    <g fill="#5b4423">
      <rect x="-14" y="-100" width="28" height="22" rx="3"/>
      <rect x="-14" y="78" width="28" height="22" rx="3"/>
      <rect x="78" y="-14" width="22" height="28" rx="3"/>
      <rect x="-100" y="-14" width="22" height="28" rx="3"/>
      <g transform="rotate(45)"><rect x="-14" y="-100" width="28" height="22" rx="3"/><rect x="-14" y="78" width="28" height="22" rx="3"/><rect x="78" y="-14" width="22" height="28" rx="3"/><rect x="-100" y="-14" width="22" height="28" rx="3"/></g>
    </g>
  </g>
  <!-- spark: energy is earned, not free -->
  <path d="M196 40 l-26 34 18 4 -16 30 40 -44 -20 -3 16 -25z" fill="#ffd24d" stroke="#b8860b" stroke-width="2"/>
